services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kerave_app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      APP_DEBUG: "true"
      database.hostname: mysql
      database.hostport: "3306"
      database.database: curve_1
      database.username: curve_1
      database.password: cHchca3cHAZ2CELX
      database.kline_hostname: mysql
      database.kline_hostport: "3306"
      database.kline_database: curve_2
      database.kline_username: curve_2
      database.kline_password: 2AMzBsa52WGwPkhG
      redis.host: redis
      redis.port: "6379"
      queue.redis.host: redis
      queue.redis.port: "6379"
      gateway.host: 0.0.0.0
      gateway.port: "2348"
      gateway.register_address: worker:1236
      gateway.lan_ip: worker
    ports:
      - "8080:80"
    volumes:
      - ./runtime:/var/www/html/runtime
      - ./public/upload:/var/www/html/public/upload
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kerave_worker
    hostname: worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      database.hostname: mysql
      database.hostport: "3306"
      database.database: curve_1
      database.username: curve_1
      database.password: cHchca3cHAZ2CELX
      database.kline_hostname: mysql
      database.kline_hostport: "3306"
      database.kline_database: curve_2
      database.kline_username: curve_2
      database.kline_password: 2AMzBsa52WGwPkhG
      redis.host: redis
      redis.port: "6379"
      queue.redis.host: redis
      queue.redis.port: "6379"
      gateway.host: 0.0.0.0
      gateway.port: "2348"
      gateway.register_address: worker:1236
      gateway.lan_ip: worker
    command: ["php", "start.php", "start"]
    ports:
      - "1236:1236"
      - "2000:2000"
      - "2348:2348"
    volumes:
      - ./runtime:/var/www/html/runtime
      - ./public/upload:/var/www/html/public/upload
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: kerave_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init/00-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql:ro
      - ./curve_1.sql:/docker-entrypoint-initdb.d/10-curve_1.sql:ro
      - ./curve_2.sql:/docker-entrypoint-initdb.d/20-curve_2.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kerave_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

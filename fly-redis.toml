# Redis on Fly.io
app = "kvi-redis"
primary_region = "nrt"

[build]
  image = "redis:7-alpine"

[processes]
  app = "redis-server --appendonly yes --requirepass kvi_redis_2026"

[mounts]
  source = "redis_data"
  destination = "/data"

[[services]]
  internal_port = 6379
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 6379

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
